<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Dateien im gleichen Ordner:
    - index.html
    - ott-background.jpg
  -->

  <style>
    :root {
      --text: rgba(236, 231, 219, 0.92);
      --soft: rgba(236, 231, 219, 0.66);
      --faint: rgba(236, 231, 219, 0.40);
      --line: rgba(92, 88, 78, 0.78);
      --edge: #11110f;
      --black: #050505;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--edge);
    }

    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background: var(--edge);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .frame {
      min-height: 100vh;
      background: var(--edge);
      padding: clamp(10px, 2.4vw, 28px);
    }

    .poster {
      position: relative;
      min-height: calc(100vh - clamp(20px, 4.8vw, 56px));
      overflow: clip;
      border: 1px solid rgba(75, 72, 64, 0.82);
      background: var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.85),
        0 22px 70px rgba(0,0,0,0.52);
      isolation: isolate;
    }

    .background {
      position: fixed;
      inset: clamp(10px, 2.4vw, 28px);
      z-index: -5;
      overflow: hidden;
      background: var(--black);
      border: 1px solid rgba(75, 72, 64, 0.82);
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.025);
      filter: brightness(0.72) contrast(1.12) saturate(0.78);
      animation: slow-breath 20s ease-in-out infinite alternate;
    }

    @keyframes slow-breath {
      from { transform: scale(1.02); filter: brightness(0.69) contrast(1.10) saturate(0.76); }
      to   { transform: scale(1.055); filter: brightness(0.78) contrast(1.16) saturate(0.82); }
    }

    .veil {
      position: fixed;
      inset: clamp(10px, 2.4vw, 28px);
      z-index: -4;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 38%, rgba(0,0,0,0.00), rgba(0,0,0,0.38) 78%),
        linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.30));
    }

    .grain {
      position: fixed;
      inset: -35%;
      z-index: -3;
      pointer-events: none;
      opacity: 0.10;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.44) 0 0.55px, transparent 0.85px),
        radial-gradient(circle, rgba(0,0,0,0.48) 0 0.75px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      mix-blend-mode: overlay;
      animation: grain 7s steps(7) infinite;
    }

    @keyframes grain {
      0% { transform: translate3d(0,0,0); }
      100% { transform: translate3d(-5%,4%,0); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 178vh;
      width: 100%;
    }

    .hero {
      width: min(100%, var(--max));
      min-height: calc(100vh - clamp(20px, 4.8vw, 56px));
      margin: 0 auto;
      padding: clamp(18px, 4vw, 52px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      color: var(--soft);
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.18em;
    }

    .mark {
      color: var(--text);
      letter-spacing: 0.42em;
      text-shadow: 0 4px 24px rgba(0,0,0,0.75);
    }

    .hover-link,
    .panel-link {
      display: inline-block;
      border-bottom: 1px solid var(--line);
      padding-bottom: 4px;
      filter: blur(0.8px);
      opacity: 0.72;
      transform: translateY(0) scale(1);
      transform-origin: left center;
      transition:
        transform 260ms ease,
        opacity 260ms ease,
        border-color 260ms ease,
        filter 260ms ease,
        color 260ms ease;
    }

    .hover-link:hover,
    .panel:hover .panel-link,
    .panel-link:hover {
      transform: translateY(-5px) scale(1.045);
      opacity: 1;
      filter: blur(0);
      border-color: rgba(236,231,219,0.82);
      color: var(--text);
    }

    .hero-center {
      align-self: center;
      justify-self: center;
      text-align: center;
      transform: translateY(4vh);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 2.9vw, 42px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: clamp(0.20em, 1vw, 0.42em);
      text-shadow: 0 6px 42px rgba(0,0,0,0.92);
      opacity: 0.88;
      filter: blur(0.4px);
      transition: none;
    }

    .scroll-layer {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 3vh clamp(18px, 4vw, 52px) 20vh;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(18px, 2.4vw, 34px);
      background: transparent;
    }

    .panel {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      min-height: 130px;
      color: var(--soft);
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.7;
      letter-spacing: 0.12em;
      opacity: 0;
      filter: blur(1.8px);
      transform: translateY(42px) scale(0.985);
      transition:
        opacity 700ms ease,
        transform 700ms ease,
        filter 380ms ease,
        color 380ms ease;
      background: transparent;
    }

    .panel.visible {
      opacity: 0.72;
      transform: translateY(0) scale(1);
    }

    .panel:hover {
      opacity: 1;
      color: var(--text);
      filter: blur(0);
      transform: translateY(-8px) scale(1.035);
    }

    .panel-label {
      display: block;
      margin-bottom: 22px;
      color: var(--faint);
      font-size: 10px;
      letter-spacing: 0.22em;
    }

    .mail { grid-column: 2 / span 4; }
    .live { grid-column: 8 / span 4; align-self: end; }

    .end-space { height: 18vh; }

    @supports (animation-timeline: view()) {
      .hero-center {
        animation: title-scroll both linear;
        animation-timeline: view();
        animation-range: exit 0% exit 100%;
      }

      .scroll-layer {
        animation: content-drift both linear;
        animation-timeline: view();
        animation-range: entry 0% entry 100%;
      }

      @keyframes title-scroll {
        from { opacity: 1; transform: translateY(4vh); filter: blur(0); }
        to   { opacity: 0; transform: translateY(-26vh); filter: blur(2.5px); }
      }

      @keyframes content-drift {
        from { transform: translateY(7vh); }
        to   { transform: translateY(-2vh); }
      }
    }

    @media (max-width: 760px) {
      .frame { padding: 0; }

      .poster {
        min-height: 100vh;
        border: 0;
        box-shadow: none;
      }

      .background,
      .veil {
        inset: 0;
        border: 0;
      }

      .background img {
        object-position: center;
        animation: none;
        transform: scale(1.01);
        filter: brightness(0.76) contrast(1.08) saturate(0.78);
      }

      .page { min-height: 160vh; }

      .hero {
        padding: 20px;
        min-height: 100svh;
      }

      .top {
        font-size: 10px;
        letter-spacing: 0.13em;
      }

      .mark { letter-spacing: 0.28em; }

      .hero-center {
        justify-self: start;
        text-align: left;
        transform: translateY(1vh);
      }

      h1 {
        max-width: 13ch;
        font-size: 22px;
        letter-spacing: 0.15em;
        filter: none;
        opacity: 0.94;
      }

      .scroll-layer {
        display: block;
        padding: 4vh 20px 15vh;
      }

      .panel,
      .panel.visible,
      .panel:hover {
        opacity: 0.90;
        transform: none;
        filter: none;
        min-height: auto;
        margin-top: 52px;
        font-size: 12px;
        line-height: 1.72;
        letter-spacing: 0.08em;
      }

      .hover-link,
      .hover-link:hover,
      .panel-link,
      .panel:hover .panel-link,
      .panel-link:hover {
        filter: none;
        opacity: 0.92;
        transform: none;
      }

      .panel-label { margin-bottom: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .panel {
        opacity: 0.82;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="poster">
      <div class="background" aria-hidden="true">
        <img src="ott-background.jpg" alt="" />
      </div>
      <div class="veil" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <div class="page">
        <header class="hero">
          <div class="top">
            <span class="mark">ott</span>
            <a class="hover-link" href="#live">live</a>
          </div>

          <div class="hero-center">
            <h1>das hier ist neuland</h1>
          </div>

          <div></div>
        </header>

        <main class="scroll-layer">
          <section class="panel mail reveal" aria-label="mail">
            <span class="panel-label">mail</span>
            <a class="panel-link" href="mailto:band@ott.band">band@ott.band</a>
          </section>

          <section id="live" class="panel live reveal" aria-label="live">
            <span class="panel-label">live</span>
            <a class="panel-link" href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">
              03.07.26<br />
              terrain gurzelen<br />
              19:30
            </a>
          </section>
        </main>

        <div class="end-space" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const items = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, {
      threshold: 0.18,
      rootMargin: '0px 0px -8% 0px'
    });

    items.forEach((item) => observer.observe(item));
  </script>
</body>
</html>
