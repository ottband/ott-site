<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Im gleichen GitHub-Ordner ablegen:
    - index.html
    - ott-background.jpg
    - ott-logo.png

    Tipp: Das Logo darf schwarz oder weiss sein, solange der Hintergrund transparent ist.
    Es wird hier per CSS-Mask automatisch weiss eingefärbt.
  -->

  <style>
    :root {
      --text: rgba(235, 232, 220, 0.94);
      --soft: rgba(235, 232, 220, 0.62);
      --faint: rgba(235, 232, 220, 0.34);

      --yellow: #c9a84e;
      --yellow-soft: rgba(201, 168, 78, 0.48);
      --yellow-haze: rgba(201, 168, 78, 0.13);
      --bluegrey: #26323b;
      --bluegrey-light: #394751;
      --bluegrey-deep: #11171d;
      --ink: #080a0c;

      --max: 1180px;
      --edge: clamp(8px, 1.8vw, 22px);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at 18% 12%, rgba(201,168,78,0.16), transparent 29%),
        radial-gradient(circle at 76% 28%, rgba(154,177,190,0.14), transparent 31%),
        linear-gradient(145deg, #303d47 0%, #1b242b 42%, #0a0d10 100%);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
      background:
        linear-gradient(116deg, transparent 0 42%, rgba(201,168,78,0.07) 42.2% 43.1%, transparent 43.3% 100%),
        linear-gradient(246deg, transparent 0 67%, rgba(143,163,174,0.075) 67.2% 68.2%, transparent 68.4% 100%),
        radial-gradient(circle at 51% 35%, rgba(255,255,255,0.040), transparent 43%),
        linear-gradient(to bottom, var(--bluegrey), var(--bluegrey-deep) 48%, var(--ink));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 105;
      pointer-events: none;
      opacity: 0.28;
      mix-blend-mode: soft-light;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 33px),
        repeating-linear-gradient(0deg, rgba(201,168,78,0.035) 0 1px, transparent 1px 41px);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 122;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 247, 214, 0.18), transparent 44%),
        linear-gradient(to bottom, rgba(255,246,210,0.055), rgba(144,167,182,0.038));
      mix-blend-mode: screen;
      animation: page-flicker 8.6s infinite;
    }

    @keyframes page-flicker {
      0%, 4.8%, 5.75%, 22%, 23.3%, 56%, 57.4%, 81%, 82.2%, 100% { opacity: 0; }
      5.05% { opacity: 0.23; }
      5.22% { opacity: 0.035; }
      5.45% { opacity: 0.18; }
      22.35% { opacity: 0.095; }
      22.74% { opacity: 0.02; }
      56.28% { opacity: 0.20; }
      56.53% { opacity: 0.045; }
      81.24% { opacity: 0.13; }
    }

    a { color: inherit; text-decoration: none; }

    .noise {
      position: fixed;
      inset: -42%;
      z-index: 112;
      pointer-events: none;
      opacity: 0.105;
      mix-blend-mode: overlay;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.45) 0 0.55px, transparent 0.95px),
        radial-gradient(circle, rgba(0,0,0,0.65) 0 0.75px, transparent 1.08px),
        linear-gradient(115deg, transparent 0 49.7%, rgba(201,168,78,0.16) 50%, transparent 50.3% 100%);
      background-size: 3px 3px, 8px 8px, 360px 360px;
      animation: grain 6.2s steps(8) infinite;
    }

    @keyframes grain {
      0% { transform: translate3d(0,0,0); }
      20% { transform: translate3d(-2%,2%,0); }
      40% { transform: translate3d(3%,-1%,0); }
      60% { transform: translate3d(-4%,-3%,0); }
      80% { transform: translate3d(2%,4%,0); }
      100% { transform: translate3d(-5%,3%,0); }
    }

    #logo-trail {
      position: fixed;
      inset: 0;
      z-index: 84;
      pointer-events: none;
      opacity: 0.78;
      mix-blend-mode: screen;
    }

    .logo-float {
      position: fixed;
      left: 0;
      top: 0;
      width: clamp(66px, 6.6vw, 112px);
      height: clamp(66px, 6.6vw, 112px);
      z-index: 92;
      pointer-events: none;
      opacity: 0.96;
      transform: translate3d(24px, 24px, 0) scale(1);
      will-change: transform;
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.22))
        drop-shadow(0 0 26px rgba(201,168,78,0.18));
    }

    .logo-mark {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.98);
      -webkit-mask: url("ott-logo.png") center / contain no-repeat;
      mask: url("ott-logo.png") center / contain no-repeat;
      animation: logo-spin 15s linear infinite, logo-flicker 4.35s steps(1) infinite;
    }

    @keyframes logo-spin {
      0% { transform: rotateY(0deg) rotateZ(-5deg) scale(1); }
      36% { transform: rotateY(126deg) rotateZ(9deg) scale(1.035); }
      67% { transform: rotateY(242deg) rotateZ(-13deg) scale(0.985); }
      100% { transform: rotateY(360deg) rotateZ(-5deg) scale(1); }
    }

    @keyframes logo-flicker {
      0%, 100% { opacity: 0.90; filter: brightness(1); }
      7% { opacity: 1; filter: brightness(2.2) sepia(0.32) saturate(1.8); }
      8% { opacity: 0.34; filter: brightness(0.46); }
      9% { opacity: 1; filter: brightness(1.75); }
      31% { opacity: 0.86; filter: brightness(0.95); }
      32% { opacity: 1; filter: brightness(2.55) sepia(0.45) saturate(2.1); }
      33% { opacity: 0.48; filter: brightness(0.62); }
      34% { opacity: 0.98; filter: brightness(1.2); }
      68% { opacity: 1; filter: brightness(2.05) sepia(0.22); }
      69% { opacity: 0.58; filter: brightness(0.72); }
      70% { opacity: 0.94; filter: brightness(1.05); }
      86% { opacity: 1; filter: brightness(1.85); }
      87% { opacity: 0.72; filter: brightness(0.82); }
    }

    .frame {
      min-height: 100vh;
      padding: var(--edge);
      background:
        radial-gradient(circle at 24% 18%, rgba(201,168,78,0.11), transparent 24%),
        radial-gradient(circle at 71% 31%, rgba(150,171,184,0.10), transparent 32%),
        linear-gradient(136deg, rgba(255,255,255,0.025), transparent 22% 76%, rgba(201,168,78,0.05)),
        linear-gradient(to bottom, rgba(52,66,76,0.64), rgba(12,15,18,0.86));
    }

    .poster {
      position: relative;
      min-height: calc(100vh - (var(--edge) * 2));
      overflow: clip;
      isolation: isolate;
      border: 1px solid rgba(131, 119, 87, 0.48);
      background: rgba(7, 9, 11, 0.62);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.78),
        inset 0 0 0 1px rgba(255,255,255,0.025),
        0 32px 96px rgba(0,0,0,0.56);
    }

    .poster::before,
    .poster::after {
      content: "";
      position: fixed;
      inset: var(--edge);
      z-index: 2;
      pointer-events: none;
    }

    .poster::before {
      opacity: 0.22;
      mix-blend-mode: screen;
      background:
        linear-gradient(108deg, transparent 0 24%, rgba(201,168,78,0.18) 24.2% 24.8%, transparent 25% 100%),
        linear-gradient(252deg, transparent 0 72%, rgba(170,192,202,0.12) 72.2% 73.4%, transparent 73.6% 100%);
    }

    .poster::after {
      opacity: 0.42;
      mix-blend-mode: multiply;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 44%, rgba(0,0,0,0.36) 84%, rgba(0,0,0,0.58) 100%);
    }

    .background,
    .veil {
      position: fixed;
      inset: var(--edge);
      pointer-events: none;
    }

    .background {
      z-index: 0;
      overflow: hidden;
      border: 1px solid rgba(117, 108, 80, 0.34);
      background:
        radial-gradient(circle at 49% 38%, rgba(201,168,78,0.13), transparent 42%),
        linear-gradient(145deg, #33404a, #121920 47%, #090b0e);
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translateY(calc(var(--scroll, 0) * -0.034px)) scale(1.022);
      filter: brightness(0.72) contrast(1.15) saturate(0.72) sepia(0.06);
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,255,255,0.050), transparent 28%),
        radial-gradient(circle at 18% 17%, rgba(201,168,78,0.16), transparent 31%),
        linear-gradient(110deg, rgba(56,72,83,0.32), transparent 38% 61%, rgba(201,168,78,0.12)),
        linear-gradient(to bottom, rgba(39,49,57,0.20), rgba(4,6,8,0.46));
      mix-blend-mode: overlay;
    }

    .veil {
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.22), transparent 18% 82%, rgba(0,0,0,0.22)),
        radial-gradient(circle at 50% 37%, rgba(255,255,255,0.032), rgba(255,255,255,0.006) 23%, rgba(0,0,0,0.18) 68%, rgba(0,0,0,0.48) 100%),
        linear-gradient(to bottom, rgba(43,54,62,0.07), rgba(0,0,0,0.40));
    }

    .page {
      position: relative;
      z-index: 5;
      min-height: 182vh;
      width: 100%;
    }

    .hero {
      width: min(100%, var(--max));
      min-height: calc(100vh - (var(--edge) * 2));
      margin: 0 auto;
      padding: clamp(18px, 4vw, 52px);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      color: var(--soft);
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.18em;
    }

    .top a {
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(201,168,78,0.16);
      filter: blur(0.7px);
      opacity: 0.68;
      transform-origin: right center;
      transition: transform 260ms ease, opacity 260ms ease, border-color 260ms ease, filter 260ms ease, color 260ms ease, text-shadow 260ms ease;
    }

    .top a:hover {
      transform: translateY(-4px) scale(1.06);
      opacity: 1;
      filter: blur(0);
      border-color: var(--yellow-soft);
      color: var(--yellow);
      text-shadow: 0 0 24px rgba(201,168,78,0.32);
    }

    .hero-center {
      align-self: center;
      justify-self: center;
      width: min(94vw, 1120px);
      text-align: center;
      transform: translateY(3.5vh);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 3.3vw, 50px);
      font-weight: 400;
      line-height: 1.06;
      letter-spacing: clamp(0.18em, 1.25vw, 0.66em);
      white-space: nowrap;
      color: rgba(238, 234, 219, 0.86);
      text-shadow:
        0 8px 48px rgba(0,0,0,0.96),
        0 0 36px rgba(201,168,78,0.08);
      opacity: clamp(0, calc(0.92 - (var(--scroll, 0) / 135)), 0.92);
      filter: blur(calc(0.22px + (var(--scroll, 0) * 0.018px)));
      transform: translateY(calc(var(--scroll, 0) * -0.48px)) scaleX(1.08);
      transform-origin: center;
    }

    .scroll-layer {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 6vh clamp(18px, 4vw, 52px) 27vh;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(20px, 3vw, 42px);
      background: transparent;
    }

    .panel {
      --panel-focus: 0;
      border-top: 1px solid rgba(201,168,78,0.16);
      padding-top: 18px;
      min-height: 178px;
      color: var(--soft);
      font-size: clamp(16px, 1.75vw, 25px);
      line-height: 1.72;
      letter-spacing: 0.13em;
      opacity: calc(0.08 + (var(--panel-focus) * 0.64));
      filter: blur(calc(5.2px - (var(--panel-focus) * 5.2px)));
      transform: translateY(calc(58px - (var(--panel-focus) * 58px))) scale(calc(0.968 + (var(--panel-focus) * 0.032)));
      transition: color 420ms ease, border-color 420ms ease, text-shadow 420ms ease;
      will-change: opacity, filter, transform;
    }

    .panel.visible {
      border-color: rgba(201,168,78,0.22);
    }

    .panel:hover {
      opacity: 1;
      color: var(--text);
      filter: blur(0);
      transform: translateY(-12px) scale(1.055);
      border-color: var(--yellow-soft);
    }

    .panel-label {
      display: block;
      margin-bottom: 24px;
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.24em;
    }

    .panel-link {
      display: inline-block;
      transform-origin: left center;
      transition: transform 260ms ease, color 260ms ease, text-shadow 260ms ease, filter 260ms ease, opacity 260ms ease;
      opacity: 0.9;
    }

    .mail-link {
      border-bottom: 1px solid rgba(201,168,78,0.28);
      padding-bottom: 5px;
    }

    .venue-link {
      color: var(--yellow);
      border-bottom: 1px solid var(--yellow-soft);
      padding-bottom: 4px;
      text-shadow: 0 0 24px rgba(201,168,78,0.12);
    }

    .panel:hover .panel-link,
    .panel-link:hover {
      opacity: 1;
      color: var(--yellow);
      transform: translateY(-4px) scale(1.1);
      text-shadow: 0 0 28px rgba(201,168,78,0.34);
      filter: blur(0);
    }

    .mail { grid-column: 2 / span 4; }
    .live { grid-column: 8 / span 4; align-self: end; }
    .end-space { height: 18vh; }

    @media (max-width: 760px) {
      :root { --edge: 8px; }

      .poster { min-height: calc(100vh - 16px); }

      .background img {
        object-fit: contain;
        object-position: center 28%;
        transform: none;
        filter: brightness(0.74) contrast(1.13) saturate(0.74) sepia(0.05);
      }

      .veil {
        background:
          linear-gradient(90deg, rgba(0,0,0,0.28), transparent 25% 75%, rgba(0,0,0,0.28)),
          linear-gradient(to bottom, rgba(36,47,55,0.04), rgba(0,0,0,0.46));
      }

      .page { min-height: 172vh; }

      .hero {
        padding: 18px 16px;
        min-height: calc(100vh - 16px);
      }

      .top {
        font-size: 10px;
        letter-spacing: 0.13em;
      }

      .top a { filter: blur(0.25px); opacity: 0.78; }

      .hero-center {
        width: 96vw;
        transform: translateY(0.5vh);
      }

      h1 {
        font-size: clamp(14px, 4vw, 20px);
        letter-spacing: clamp(0.105em, 1.45vw, 0.19em);
        color: rgba(238, 234, 219, 0.84);
        transform: translateY(calc(var(--scroll, 0) * -0.44px)) scaleX(1.035);
      }

      .scroll-layer {
        display: block;
        padding: 9vh 22px 19vh;
      }

      .panel,
      .panel.visible,
      .panel:hover {
        min-height: auto;
        margin-top: 68px;
        font-size: 14px;
        line-height: 1.78;
        letter-spacing: 0.09em;
        opacity: calc(0.12 + (var(--panel-focus) * 0.86));
        filter: blur(calc(7.5px - (var(--panel-focus) * 7.5px)));
        transform: translateY(calc(42px - (var(--panel-focus) * 42px))) scale(calc(0.975 + (var(--panel-focus) * 0.025)));
        transition: color 300ms ease, border-color 300ms ease;
      }

      .panel:hover .panel-link,
      .panel-link:hover { transform: none; }

      .panel-label { margin-bottom: 14px; }

      .logo-float {
        width: 68px;
        height: 68px;
      }

      #logo-trail { opacity: 0.54; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      #logo-trail { display: none; }
      .logo-float { transform: translate3d(18px, 18px, 0) !important; }
      .panel { opacity: 0.86; transform: none; filter: none; }
      h1 { opacity: 0.86; transform: none; filter: none; }
    }
  </style>
</head>

<body>
  <canvas id="logo-trail" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>

  <div class="logo-float" id="logo" aria-hidden="true">
    <div class="logo-mark"></div>
  </div>

  <div class="frame">
    <div class="poster">
      <div class="background" aria-hidden="true">
        <img src="ott-background.jpg" alt="" />
      </div>
      <div class="veil" aria-hidden="true"></div>

      <div class="page">
        <header class="hero">
          <div class="top">
            <a href="#live">live</a>
          </div>

          <div class="hero-center">
            <h1>das hier ist neuland</h1>
          </div>
        </header>

        <main class="scroll-layer">
          <section class="panel mail reveal" aria-label="mail">
            <a class="panel-link mail-link" href="mailto:band@ott.band">band@ott.band</a>
          </section>

          <section id="live" class="panel live reveal" aria-label="live">
            <span class="panel-label">live</span>
            <span>03.07.26</span><br />
            <a class="panel-link venue-link" href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">terrain gurzelen</a><br />
            <span>19:30</span>
          </section>
        </main>

        <div class="end-space" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const logo = document.getElementById('logo');
    const panels = [...document.querySelectorAll('.panel')];
    const trailCanvas = document.getElementById('logo-trail');
    const trailCtx = trailCanvas ? trailCanvas.getContext('2d', { alpha: true }) : null;
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const mobileQuery = window.matchMedia('(max-width: 760px)');

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const lerp = (a, b, n) => a + (b - a) * n;

    function updateScrollEffects() {
      const scrollY = window.scrollY || 0;
      const viewportH = window.innerHeight || 1;
      root.style.setProperty('--scroll', String(scrollY));

      panels.forEach((panel) => {
        const rect = panel.getBoundingClientRect();
        const focusPoint = rect.top + rect.height * 0.38;
        const idealPoint = viewportH * (mobileQuery.matches ? 0.58 : 0.60);
        const range = viewportH * (mobileQuery.matches ? 0.62 : 0.68);
        const raw = 1 - Math.abs(focusPoint - idealPoint) / range;
        const focus = clamp(raw * 1.25, 0, 1);
        panel.style.setProperty('--panel-focus', focus.toFixed(3));
      });
    }

    updateScrollEffects();
    window.addEventListener('scroll', updateScrollEffects, { passive: true });
    window.addEventListener('resize', updateScrollEffects, { passive: true });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, {
      threshold: 0.14,
      rootMargin: '0px 0px -8% 0px'
    });
    document.querySelectorAll('.reveal').forEach((item) => observer.observe(item));

    if (trailCanvas && trailCtx) {
      function resizeTrailCanvas() {
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        trailCanvas.width = Math.floor(window.innerWidth * ratio);
        trailCanvas.height = Math.floor(window.innerHeight * ratio);
        trailCanvas.style.width = `${window.innerWidth}px`;
        trailCanvas.style.height = `${window.innerHeight}px`;
        trailCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }
      resizeTrailCanvas();
      window.addEventListener('resize', resizeTrailCanvas, { passive: true });
    }

    if (logo && !reducedMotion) {
      let mouseX = window.innerWidth * 0.54;
      let mouseY = window.innerHeight * 0.42;
      let cx = 30;
      let cy = 30;
      let t = Math.random() * 100;
      let lastTime = performance.now();
      let nextWaypointAt = 0;
      let waypointX = window.innerWidth * 0.55;
      let waypointY = window.innerHeight * 0.35;
      let previousTrailX = null;
      let previousTrailY = null;

      window.addEventListener('mousemove', (event) => {
        mouseX = event.clientX;
        mouseY = event.clientY;
      }, { passive: true });

      function chooseWaypoint(now) {
        nextWaypointAt = now + 2400 + Math.random() * 4200;
        const margin = 70;
        waypointX = margin + Math.random() * Math.max(1, window.innerWidth - margin * 2);
        waypointY = margin + Math.random() * Math.max(1, window.innerHeight - margin * 2);
      }

      function drawTrail(x, y, size, intensity) {
        if (!trailCtx || !trailCanvas) return;

        trailCtx.globalCompositeOperation = 'destination-out';
        trailCtx.fillStyle = 'rgba(0,0,0,0.052)';
        trailCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        trailCtx.globalCompositeOperation = 'lighter';

        if (previousTrailX !== null) {
          trailCtx.beginPath();
          trailCtx.moveTo(previousTrailX, previousTrailY);
          trailCtx.lineTo(x, y);
          trailCtx.strokeStyle = `rgba(255,255,255,${0.030 + intensity * 0.035})`;
          trailCtx.lineWidth = Math.max(1, size * 0.055);
          trailCtx.lineCap = 'round';
          trailCtx.stroke();
        }

        const particleCount = mobileQuery.matches ? 2 : 4;
        for (let i = 0; i < particleCount; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * size * 0.34;
          const px = x + Math.cos(angle) * distance;
          const py = y + Math.sin(angle) * distance;
          const radius = 0.8 + Math.random() * (mobileQuery.matches ? 2.1 : 3.2);

          trailCtx.beginPath();
          trailCtx.arc(px, py, radius, 0, Math.PI * 2);
          trailCtx.fillStyle = Math.random() > 0.62
            ? `rgba(201,168,78,${0.035 + Math.random() * 0.065})`
            : `rgba(255,255,255,${0.030 + Math.random() * 0.075})`;
          trailCtx.fill();
        }

        previousTrailX = x;
        previousTrailY = y;
      }

      function moveLogo(now) {
        const dt = clamp((now - lastTime) / 16.67, 0.2, 2.2);
        lastTime = now;

        const isMobile = mobileQuery.matches;
        if (isMobile && now > nextWaypointAt) chooseWaypoint(now);
        if (!nextWaypointAt) chooseWaypoint(now);

        const speedPulse = 0.72 + Math.sin(t * 0.19) * 0.26 + Math.sin(t * 0.047 + 4.1) * 0.20;
        t += (0.016 + Math.max(0.002, speedPulse) * 0.014) * dt;

        const logoSize = logo.getBoundingClientRect().width || 80;
        const baseX = isMobile ? waypointX : mouseX;
        const baseY = isMobile ? waypointY : mouseY;

        const wanderX =
          Math.sin(t * 0.71 + 0.4) * (isMobile ? 42 : 74) +
          Math.sin(t * 1.47 + 1.8) * (isMobile ? 22 : 38) +
          Math.cos(t * 2.13 + 0.2) * (isMobile ? 10 : 18);

        const wanderY =
          Math.cos(t * 0.59 + 2.0) * (isMobile ? 54 : 68) +
          Math.sin(t * 1.06 + 4.6) * (isMobile ? 30 : 52) -
          Math.sin(t * 0.23) * (isMobile ? 10 : 28);

        const targetX = clamp(baseX + wanderX - logoSize / 2, 8, window.innerWidth - logoSize - 8);
        const targetY = clamp(baseY + wanderY - logoSize / 2, 8, window.innerHeight - logoSize - 8);
        const ease = isMobile ? 0.018 + Math.max(0, speedPulse) * 0.010 : 0.025 + Math.max(0, speedPulse) * 0.013;

        cx = lerp(cx, targetX, ease * dt);
        cy = lerp(cy, targetY, ease * dt);

        const scale = clamp(
          1.08 + Math.sin(t * 0.53) * 0.13 + Math.sin(t * 1.31 + 1.5) * 0.075,
          0.94,
          1.28
        );

        logo.style.transform = `translate3d(${cx}px, ${cy}px, 0) scale(${scale})`;

        drawTrail(cx + logoSize * 0.5, cy + logoSize * 0.5, logoSize * scale, clamp(speedPulse, 0, 1.4));
        requestAnimationFrame(moveLogo);
      }

      requestAnimationFrame(moveLogo);
    }
  </script>
</body>
