<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Im gleichen Ordner hochladen:
    - index.html
    - ott-background.jpg
    - ott-logo.png
  -->

  <style>
    :root {
      --bg0: #0d1014;
      --bg1: #171c22;
      --bg2: #242b31;
      --text: rgba(228, 224, 213, 0.92);
      --muted: rgba(228, 224, 213, 0.58);
      --faint: rgba(228, 224, 213, 0.32);
      --yellow: #c7a24a;
      --yellow-soft: rgba(199, 162, 74, 0.45);
      --line: rgba(133, 116, 72, 0.22);
      --max: 1220px;
      --scroll: 0;
      --hero-opacity: 1;
      --hero-y: 0px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 45%),
        linear-gradient(to bottom, var(--bg2), var(--bg1) 42%, var(--bg0));
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.025), transparent 45%),
        linear-gradient(to bottom, #2b333b, #171c22 42%, #0d1014);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
    }

    a { color: inherit; text-decoration: none; }

    .noise {
      position: fixed;
      inset: -50%;
      z-index: 100;
      pointer-events: none;
      opacity: 0.075;
      mix-blend-mode: overlay;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.3) 0 0.5px, transparent 0.9px),
        radial-gradient(circle, rgba(0,0,0,0.5) 0 0.8px, transparent 1px);
      background-size: 3px 3px, 8px 8px;
      animation: grain 8s steps(6) infinite;
    }

    @keyframes grain {
      0% { transform: translate(0,0); }
      100% { transform: translate(-5%,4%); }
    }

    .logo-float {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 80;
      width: clamp(46px, 5vw, 76px);
      aspect-ratio: 1;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.95;
      filter: drop-shadow(0 0 12px rgba(199,162,74,0.16));
      transform: translate(18px, 18px);
      will-change: transform;
    }

    .logo-float img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: rotateLogo 18s linear infinite, flicker 7s infinite;
    }

    @keyframes rotateLogo {
      0% { transform: rotateY(0deg) rotateZ(0deg) scale(1); }
      50% { transform: rotateY(180deg) rotateZ(7deg) scale(1.04); }
      100% { transform: rotateY(360deg) rotateZ(0deg) scale(1); }
    }

    @keyframes flicker {
      0%, 100% { filter: brightness(1) sepia(0); }
      8% { filter: brightness(1.1) sepia(0.15); }
      9% { filter: brightness(0.78) sepia(0.4) hue-rotate(-12deg); }
      10% { filter: brightness(1.28) sepia(0.55) hue-rotate(-18deg); }
      12% { filter: brightness(1) sepia(0); }
      63% { filter: brightness(1.35) sepia(0.5) hue-rotate(-20deg); }
      64% { filter: brightness(0.72) sepia(0.2); }
      65% { filter: brightness(1) sepia(0); }
    }

    .frame {
      min-height: 100vh;
      padding: clamp(8px, 1.6vw, 22px);
    }

    .site {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 20px);
      border: 1px solid rgba(137,121,74,0.22);
      background: rgba(0,0,0,0.35);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 40px 120px rgba(0,0,0,0.45);
    }

    .background,
    .overlay {
      position: fixed;
      inset: clamp(8px, 1.6vw, 22px);
      pointer-events: none;
    }

    .background {
      z-index: -10;
      overflow: hidden;
      background: #0b0d10;
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translateY(calc(var(--scroll) * -0.03px)) scale(1.02);
      filter: brightness(0.70) contrast(1.15) saturate(0.70);
    }

    .overlay {
      z-index: -9;
      background:
        linear-gradient(90deg, rgba(199,162,74,0.035) 0 1px, transparent 1px 100%),
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.05), rgba(255,255,255,0.01) 18%, rgba(0,0,0,0.18) 55%, rgba(0,0,0,0.46)),
        linear-gradient(to bottom, rgba(27,32,38,0.04), rgba(0,0,0,0.50));
      background-size: 72px 100%, auto, auto;
    }

    .page {
      width: min(100%, var(--max));
      margin: 0 auto;
      min-height: 180vh;
      padding: 28px clamp(18px, 4vw, 52px) 22vh;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(228,224,213,0.55);
    }

    .top a {
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(199,162,74,0.12);
      transition: color 220ms ease, border-color 220ms ease, transform 220ms ease;
    }

    .top a:hover {
      color: var(--yellow);
      border-color: rgba(199,162,74,0.42);
      transform: translateY(-2px);
    }

    .hero {
      min-height: 82vh;
      display: grid;
      place-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(13px, 1.9vw, 26px);
      font-weight: 400;
      letter-spacing: clamp(0.18em, 0.8vw, 0.42em);
      color: rgba(199,162,74,0.86);
      opacity: var(--hero-opacity);
      transform: translateY(var(--hero-y));
      text-shadow:
        0 0 14px rgba(199,162,74,0.08),
        0 0 42px rgba(0,0,0,0.7);
      white-space: nowrap;
      transition: opacity 50ms linear;
      will-change: opacity, transform;
    }

    .info {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(24px, 3vw, 48px);
      margin-top: 4vh;
    }

    .block {
      min-height: 170px;
      padding-top: 18px;
      border-top: 1px solid rgba(199,162,74,0.12);
      color: var(--muted);
      font-size: clamp(14px, 1.3vw, 20px);
      line-height: 1.7;
      letter-spacing: 0.12em;
      background: linear-gradient(to bottom, rgba(255,255,255,0.008), transparent);
      opacity: 0;
      transform: translateY(34px);
      transition:
        opacity 540ms ease,
        transform 540ms ease,
        color 260ms ease,
        border-color 260ms ease;
    }

    .block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .block:hover {
      color: var(--text);
      border-color: rgba(199,162,74,0.34);
    }

    .mail { grid-column: 2 / span 4; }
    .live { grid-column: 8 / span 4; }

    .label {
      display: block;
      margin-bottom: 22px;
      color: var(--faint);
      font-size: 10px;
      letter-spacing: 0.24em;
    }

    .link {
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(199,162,74,0.16);
      transition: color 220ms ease, transform 220ms ease, border-color 220ms ease, text-shadow 220ms ease;
    }

    .link:hover {
      color: var(--yellow);
      border-color: rgba(199,162,74,0.42);
      transform: translateY(-2px);
      text-shadow: 0 0 22px rgba(199,162,74,0.22);
    }

    @media (max-width: 760px) {
      .background img {
        object-fit: contain;
        object-position: center 24%;
        transform: none;
        filter: brightness(0.64) contrast(1.16) saturate(0.68);
      }

      .page {
        min-height: 160vh;
        padding: 18px 22px 18vh;
      }

      .hero { min-height: 70vh; }

      h1 {
        font-size: clamp(12px, 3.5vw, 17px);
        letter-spacing: 0.12em;
      }

      .info { display: block; }

      .block,
      .block.visible {
        min-height: auto;
        margin-top: 70px;
        font-size: 14px;
        opacity: 1;
        transform: none;
      }

      .logo-float {
        width: 58px;
        animation: driftMobile 18s ease-in-out infinite alternate;
      }

      @keyframes driftMobile {
        0% { transform: translate(8vw, 8vh); }
        48% { transform: translate(72vw, 22vh); }
        100% { transform: translate(18vw, 58vh); }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .block { opacity: 1; transform: none; }
      .logo-float { transform: translate(18px, 18px) !important; }
    }
  </style>
</head>

<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="logo-float" id="logo" aria-hidden="true">
    <img src="ott-logo.png" alt="" />
  </div>

  <div class="frame">
    <div class="site">
      <div class="background" aria-hidden="true">
        <img src="ott-background.jpg" alt="" />
      </div>
      <div class="overlay" aria-hidden="true"></div>

      <div class="page">
        <div class="top">
          <a href="#live">live</a>
        </div>

        <section class="hero" aria-label="intro">
          <h1>das hier ist neuland</h1>
        </section>

        <section class="info" aria-label="kontakt und live">
          <div class="block reveal mail">
            <a class="link" href="mailto:band@ott.band">band@ott.band</a>
          </div>

          <div class="block reveal live" id="live">
            <span class="label">live</span>
            <span>03.07.26</span><br />
            <a class="link" href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">terrain gurzelen</a><br />
            <span>19:30</span>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const logo = document.getElementById('logo');
    const isMobile = window.matchMedia('(max-width: 760px)').matches;

    function updateScroll() {
      const y = window.scrollY || 0;
      const opacity = Math.max(0, Math.min(1, 1 - y / 115));
      root.style.setProperty('--scroll', String(y));
      root.style.setProperty('--hero-opacity', String(opacity));
      root.style.setProperty('--hero-y', `${Math.round(y * -0.32)}px`);
    }

    updateScroll();
    window.addEventListener('scroll', updateScroll, { passive: true });

    const blocks = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.16, rootMargin: '0px 0px -10% 0px' });
    blocks.forEach((block) => observer.observe(block));

    if (!isMobile && logo) {
      let mouseX = window.innerWidth * 0.12;
      let mouseY = window.innerHeight * 0.16;
      let currentX = 18;
      let currentY = 18;

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      }, { passive: true });

      function animateLogo() {
        currentX += ((mouseX - 38) - currentX) * 0.035;
        currentY += ((mouseY - 38) - currentY) * 0.035;
        logo.style.transform = `translate(${currentX}px, ${currentY}px)`;
        requestAnimationFrame(animateLogo);
      }

      animateLogo();
    }
  </script>
</body>
</html>
