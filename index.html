<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Im gleichen GitHub-Ordner ablegen:
    - index.html
    - ott-background.jpg

    Kein Logo-File nötig: Das Logo ist direkt als SVG im HTML eingebaut.
  -->

  <style>
    :root {
      --text: rgba(236, 232, 219, 0.94);
      --soft: rgba(236, 232, 219, 0.61);
      --faint: rgba(236, 232, 219, 0.34);

      --yellow: #c6a14a;
      --yellow-soft: rgba(198, 161, 74, 0.46);
      --yellow-haze: rgba(198, 161, 74, 0.10);

      --edge-dark: #0b0c09;
      --edge-mid: #171713;
      --edge-soft: #25241f;
      --edge-warm: #38352b;

      --max: 1180px;
      --edge: clamp(8px, 1.8vw, 22px);
      --image-inset: clamp(16px, 2.35vw, 42px);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--edge-dark);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
      background: var(--edge-mid);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 122;
      pointer-events: none;
      opacity: 0;
      background: rgba(255, 239, 194, 0.075);
      mix-blend-mode: screen;
      animation: page-flicker 8.4s infinite;
    }

    @keyframes page-flicker {
      0%, 4.8%, 5.75%, 22%, 23.3%, 56%, 57.4%, 81%, 82.2%, 100% { opacity: 0; }
      5.05% { opacity: 0.20; }
      5.22% { opacity: 0.030; }
      5.45% { opacity: 0.15; }
      22.35% { opacity: 0.075; }
      22.74% { opacity: 0.018; }
      56.28% { opacity: 0.16; }
      56.53% { opacity: 0.038; }
      81.24% { opacity: 0.105; }
    }

    a { color: inherit; text-decoration: none; }

    .noise {
      position: fixed;
      inset: -42%;
      z-index: 112;
      pointer-events: none;
      opacity: 0.075;
      mix-blend-mode: overlay;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.36) 0 0.55px, transparent 0.95px),
        radial-gradient(circle, rgba(0,0,0,0.70) 0 0.75px, transparent 1.08px);
      background-size: 3px 3px, 8px 8px;
      animation: grain 6.2s steps(8) infinite;
    }

    @keyframes grain {
      0% { transform: translate3d(0,0,0); }
      20% { transform: translate3d(-2%,2%,0); }
      40% { transform: translate3d(3%,-1%,0); }
      60% { transform: translate3d(-4%,-3%,0); }
      80% { transform: translate3d(2%,4%,0); }
      100% { transform: translate3d(-5%,3%,0); }
    }

    .logo-float {
      position: fixed;
      left: 0;
      top: 0;
      width: clamp(64px, 6.4vw, 106px);
      height: clamp(64px, 6.4vw, 106px);
      z-index: 96;
      pointer-events: none;
      opacity: 0.96;
      transform: translate3d(24px, 24px, 0) scale(1);
      will-change: transform;
      filter:
        drop-shadow(0 0 9px rgba(255,255,255,0.22))
        drop-shadow(0 0 24px rgba(198,161,74,0.17));
    }

    .logo-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      background: transparent;
      animation: logo-spin 15s linear infinite, logo-flicker 4.35s steps(1) infinite;
    }

    .logo-svg circle,
    .logo-svg path {
      fill: none;
      stroke: rgba(255,255,255,0.985);
      stroke-width: 7.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .logo-svg .ghost-line {
      stroke: rgba(255,255,255,0.15);
      stroke-width: 9.4;
      filter: blur(1.8px);
    }

    @keyframes logo-spin {
      0% { transform: rotateY(0deg) rotateZ(-5deg) scale(1); }
      36% { transform: rotateY(126deg) rotateZ(9deg) scale(1.035); }
      67% { transform: rotateY(242deg) rotateZ(-13deg) scale(0.985); }
      100% { transform: rotateY(360deg) rotateZ(-5deg) scale(1); }
    }

    @keyframes logo-flicker {
      0%, 100% { opacity: 0.90; filter: brightness(1); }
      7% { opacity: 1; filter: brightness(2.10); }
      8% { opacity: 0.40; filter: brightness(0.52); }
      9% { opacity: 1; filter: brightness(1.70); }
      31% { opacity: 0.86; filter: brightness(0.95); }
      32% { opacity: 1; filter: brightness(2.35); }
      33% { opacity: 0.52; filter: brightness(0.66); }
      34% { opacity: 0.98; filter: brightness(1.16); }
      68% { opacity: 1; filter: brightness(1.95); }
      69% { opacity: 0.62; filter: brightness(0.76); }
      70% { opacity: 0.94; filter: brightness(1.05); }
      86% { opacity: 1; filter: brightness(1.72); }
      87% { opacity: 0.74; filter: brightness(0.86); }
    }

    .frame {
      min-height: 100vh;
      padding: var(--edge);
      background:
        radial-gradient(circle at 19% 16%, rgba(198,161,74,0.055), transparent 29%),
        radial-gradient(circle at 86% 79%, rgba(198,161,74,0.035), transparent 27%),
        var(--edge-mid);
    }

    .poster {
      position: relative;
      min-height: calc(100vh - (var(--edge) * 2));
      overflow: clip;
      isolation: isolate;
      border: 1px solid rgba(111, 101, 73, 0.38);
      background: var(--edge-dark);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.72),
        inset 0 0 0 1px rgba(255,255,255,0.018),
        0 30px 92px rgba(0,0,0,0.54);
    }

    .poster::after {
      content: "";
      position: fixed;
      inset: var(--edge);
      z-index: 3;
      pointer-events: none;
      opacity: 0.38;
      mix-blend-mode: multiply;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 45%, rgba(0,0,0,0.22) 79%, rgba(0,0,0,0.50) 100%);
    }

    .background,
    .veil {
      position: fixed;
      inset: var(--edge);
      pointer-events: none;
    }

    .background {
      z-index: 0;
      overflow: hidden;
      border: 1px solid rgba(118, 108, 77, 0.30);
      background:
        radial-gradient(circle at 50% 50%, var(--edge-soft), var(--edge-mid) 54%, var(--edge-dark) 100%);
    }

    .background img {
      position: absolute;
      inset: var(--image-inset);
      width: calc(100% - (var(--image-inset) * 2));
      height: calc(100% - (var(--image-inset) * 2));
      object-fit: contain;
      object-position: center;
      transform: translateY(calc(var(--scroll, 0) * -0.030px)) scale(0.985);
      transform-origin: center;
      opacity: 0.93;
      filter: brightness(0.74) contrast(1.12) saturate(0.78) sepia(0.055);
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 49%, transparent 0 43%, rgba(7,8,6,0.20) 78%, rgba(7,8,6,0.48) 100%),
        radial-gradient(circle at 23% 21%, rgba(198,161,74,0.060), transparent 30%);
      mix-blend-mode: normal;
    }

    .veil {
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.18), transparent 18% 82%, rgba(0,0,0,0.18)),
        linear-gradient(to bottom, rgba(0,0,0,0.04), rgba(0,0,0,0.24));
    }

    #logo-trail {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0.84;
      mix-blend-mode: screen;
    }

    .page {
      position: relative;
      z-index: 5;
      min-height: 182vh;
      width: 100%;
    }

    .hero {
      position: relative;
      width: min(100%, var(--max));
      min-height: calc(100vh - (var(--edge) * 2));
      margin: 0 auto;
      padding: clamp(18px, 4vw, 52px);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      color: var(--soft);
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.18em;
    }

    .top a {
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(198,161,74,0.16);
      filter: blur(0.7px);
      opacity: 0.68;
      transform-origin: right center;
      transition: transform 260ms ease, opacity 260ms ease, border-color 260ms ease, filter 260ms ease, color 260ms ease, text-shadow 260ms ease;
    }

    .top a:hover {
      transform: translateY(-4px) scale(1.06);
      opacity: 1;
      filter: blur(0);
      border-color: var(--yellow-soft);
      color: var(--yellow);
      text-shadow: 0 0 24px rgba(198,161,74,0.32);
    }

    .hero-center {
      align-self: center;
      justify-self: center;
      width: min(94vw, 1080px);
      text-align: center;
      transform: translateY(3.2vh);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(19px, 3.05vw, 46px);
      font-weight: 400;
      line-height: 1.06;
      letter-spacing: clamp(0.16em, 1.05vw, 0.54em);
      white-space: nowrap;
      color: rgba(238, 234, 219, 0.86);
      text-shadow:
        0 8px 48px rgba(0,0,0,0.92),
        0 0 34px rgba(198,161,74,0.08);
      opacity: clamp(0, calc(0.92 - (var(--scroll, 0) / 135)), 0.92);
      filter: blur(calc(0.20px + (var(--scroll, 0) * 0.018px)));
      transform: translateY(calc(var(--scroll, 0) * -0.48px)) scaleX(1.035);
      transform-origin: center;
    }

    .scroll-layer {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 6vh clamp(18px, 4vw, 52px) 27vh;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(20px, 3vw, 42px);
      background: transparent;
    }

    .panel {
      --panel-focus: 0;
      border-top: 1px solid rgba(198,161,74,0.16);
      padding-top: 18px;
      min-height: 178px;
      color: var(--soft);
      font-size: clamp(16px, 1.75vw, 25px);
      line-height: 1.72;
      letter-spacing: 0.13em;
      opacity: calc(0.08 + (var(--panel-focus) * 0.82));
      filter: blur(calc(6.2px - (var(--panel-focus) * 6.2px)));
      transform: translateY(calc(60px - (var(--panel-focus) * 60px))) scale(calc(0.965 + (var(--panel-focus) * 0.035)));
      transition:
        opacity 520ms ease,
        filter 520ms ease,
        transform 520ms ease,
        color 420ms ease,
        border-color 420ms ease,
        text-shadow 420ms ease;
      will-change: opacity, filter, transform;
    }

    .panel.visible {
      border-color: rgba(198,161,74,0.22);
    }

    .panel:hover {
      opacity: 1;
      color: var(--text);
      filter: blur(0);
      transform: translateY(-12px) scale(1.055);
      border-color: var(--yellow-soft);
    }

    .panel-label {
      display: block;
      margin-bottom: 24px;
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.24em;
    }

    .panel-link {
      display: inline-block;
      transform-origin: left center;
      transition: transform 260ms ease, color 260ms ease, text-shadow 260ms ease, filter 260ms ease, opacity 260ms ease;
      opacity: 0.9;
    }

    .mail-link {
      border-bottom: 1px solid rgba(198,161,74,0.28);
      padding-bottom: 5px;
    }

    .venue-link {
      color: var(--yellow);
      border-bottom: 1px solid var(--yellow-soft);
      padding-bottom: 4px;
      text-shadow: 0 0 24px rgba(198,161,74,0.12);
    }

    .panel:hover .panel-link,
    .panel-link:hover {
      opacity: 1;
      color: var(--yellow);
      transform: translateY(-4px) scale(1.1);
      text-shadow: 0 0 28px rgba(198,161,74,0.34);
      filter: blur(0);
    }

    .mail { grid-column: 2 / span 4; }
    .live { grid-column: 8 / span 4; align-self: end; }
    .end-space { height: 18vh; }

    @media (max-width: 760px) {
      :root {
        --edge: 8px;
        --image-inset: 10px;
      }

      html,
      body {
        background: #10110e;
      }

      .frame {
        background: #151611;
      }

      .poster {
        min-height: calc(100vh - 16px);
      }

      .background {
        background: #11120e;
      }

      .background img {
        object-fit: contain;
        object-position: center center;
        transform: translateY(calc(var(--scroll, 0) * -0.010px)) scale(0.985);
        filter: brightness(0.75) contrast(1.11) saturate(0.78) sepia(0.055);
      }

      .veil {
        background:
          linear-gradient(90deg, rgba(0,0,0,0.20), transparent 24% 76%, rgba(0,0,0,0.20)),
          linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0.32));
      }

      .page { min-height: 172vh; }

      .hero {
        padding: 18px 16px;
        min-height: calc(100svh - 16px);
      }

      .top {
        font-size: 10px;
        letter-spacing: 0.13em;
      }

      .top a { filter: blur(0.25px); opacity: 0.78; }

      .hero-center {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 96vw;
        transform: translate(-50%, -50%);
      }

      h1 {
        font-size: clamp(14px, 3.75vw, 19px);
        letter-spacing: clamp(0.095em, 1.25vw, 0.17em);
        color: rgba(238, 234, 219, 0.84);
        transform: translateY(calc(var(--scroll, 0) * -0.44px)) scaleX(1.015);
      }

      .scroll-layer {
        display: block;
        padding: 9vh 22px 19vh;
      }

      .panel,
      .panel.visible,
      .panel:hover {
        min-height: auto;
        margin-top: 68px;
        font-size: 14px;
        line-height: 1.78;
        letter-spacing: 0.09em;
        opacity: calc(0.10 + (var(--panel-focus) * 0.90));
        filter: blur(calc(7.8px - (var(--panel-focus) * 7.8px)));
        transform: translateY(calc(46px - (var(--panel-focus) * 46px))) scale(calc(0.972 + (var(--panel-focus) * 0.028)));
        transition: opacity 460ms ease, filter 460ms ease, transform 460ms ease, color 300ms ease, border-color 300ms ease;
      }

      .panel:hover {
        opacity: 1;
        filter: blur(0);
        transform: translateY(-4px) scale(1.02);
      }

      .panel:hover .panel-link,
      .panel-link:hover { transform: none; }

      .panel-label { margin-bottom: 14px; }

      .logo-float {
        width: 68px;
        height: 68px;
      }

      #logo-trail { opacity: 0.60; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      #logo-trail { display: none; }
      .logo-float { transform: translate3d(18px, 18px, 0) !important; }
      .panel { opacity: 0.86; transform: none; filter: none; }
      h1 { opacity: 0.86; transform: none; filter: none; }
    }
  </style>
</head>

<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="logo-float" id="logo" aria-hidden="true">
    <svg class="logo-svg" viewBox="0 0 120 120" role="img" aria-label="ott logo">
      <circle class="ghost-line" cx="60" cy="72" r="39"></circle>
      <path class="ghost-line" d="M49 26 C51 42 52 61 55 84"></path>
      <path class="ghost-line" d="M76 20 C76 40 77 57 79 74"></path>
      <path class="ghost-line" d="M43 51 C48 51 53 51 59 50"></path>
      <path class="ghost-line" d="M70 54 C76 55 83 55 88 54"></path>

      <circle cx="60" cy="72" r="39"></circle>
      <path d="M49 26 C51 42 52 61 55 84"></path>
      <path d="M76 20 C76 40 77 57 79 74"></path>
      <path d="M43 51 C48 51 53 51 59 50"></path>
      <path d="M70 54 C76 55 83 55 88 54"></path>
    </svg>
  </div>

  <div class="frame">
    <div class="poster">
      <div class="background" aria-hidden="true">
        <img src="ott-background.jpg" alt="" />
      </div>
      <div class="veil" aria-hidden="true"></div>
      <canvas id="logo-trail" aria-hidden="true"></canvas>

      <div class="page">
        <header class="hero">
          <div class="top">
            <a href="#live">live</a>
          </div>

          <div class="hero-center">
            <h1>das hier ist neuland</h1>
          </div>
        </header>

        <main class="scroll-layer">
          <section class="panel mail reveal" aria-label="mail">
            <a class="panel-link mail-link" href="mailto:band@ott.band">band@ott.band</a>
          </section>

          <section id="live" class="panel live reveal" aria-label="live">
            <span class="panel-label">live</span>
            <span>03.07.26</span><br />
            <a class="panel-link venue-link" href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">terrain gurzelen</a><br />
            <span>19:30</span>
          </section>
        </main>

        <div class="end-space" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const logo = document.getElementById('logo');
    const panels = [...document.querySelectorAll('.panel')];
    const trailCanvas = document.getElementById('logo-trail');
    const trailCtx = trailCanvas ? trailCanvas.getContext('2d', { alpha: true }) : null;
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const mobileQuery = window.matchMedia('(max-width: 760px)');

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const lerp = (a, b, n) => a + (b - a) * n;

    function updateScrollEffects() {
      const scrollY = window.scrollY || 0;
      const viewportH = window.innerHeight || 1;
      root.style.setProperty('--scroll', String(scrollY));

      panels.forEach((panel) => {
        const rect = panel.getBoundingClientRect();
        const focusPoint = rect.top + rect.height * 0.38;
        const idealPoint = viewportH * (mobileQuery.matches ? 0.58 : 0.60);
        const range = viewportH * (mobileQuery.matches ? 0.72 : 0.74);
        const raw = 1 - Math.abs(focusPoint - idealPoint) / range;
        const focus = clamp(raw * 1.35, 0, 1);
        panel.style.setProperty('--panel-focus', focus.toFixed(3));
      });
    }

    updateScrollEffects();
    window.addEventListener('scroll', updateScrollEffects, { passive: true });
    window.addEventListener('resize', updateScrollEffects, { passive: true });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, {
      threshold: 0.14,
      rootMargin: '0px 0px -8% 0px'
    });
    document.querySelectorAll('.reveal').forEach((item) => observer.observe(item));

    if (trailCanvas && trailCtx) {
      function resizeTrailCanvas() {
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        trailCanvas.width = Math.floor(window.innerWidth * ratio);
        trailCanvas.height = Math.floor(window.innerHeight * ratio);
        trailCanvas.style.width = `${window.innerWidth}px`;
        trailCanvas.style.height = `${window.innerHeight}px`;
        trailCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }
      resizeTrailCanvas();
      window.addEventListener('resize', resizeTrailCanvas, { passive: true });
    }

    if (logo && !reducedMotion) {
      let mouseX = window.innerWidth * 0.54;
      let mouseY = window.innerHeight * 0.42;
      let cx = 30;
      let cy = 30;
      let t = Math.random() * 100;
      let lastTime = performance.now();
      let nextWaypointAt = 0;
      let waypointX = window.innerWidth * 0.55;
      let waypointY = window.innerHeight * 0.35;
      let previousTrailX = null;
      let previousTrailY = null;

      window.addEventListener('mousemove', (event) => {
        mouseX = event.clientX;
        mouseY = event.clientY;
      }, { passive: true });

      function chooseWaypoint(now) {
        nextWaypointAt = now + 2200 + Math.random() * 4600;
        const margin = 76;
        waypointX = margin + Math.random() * Math.max(1, window.innerWidth - margin * 2);
        waypointY = margin + Math.random() * Math.max(1, window.innerHeight - margin * 2);
      }

      function drawTrail(x, y, size, intensity) {
        if (!trailCtx || !trailCanvas) return;

        trailCtx.globalCompositeOperation = 'destination-out';
        trailCtx.fillStyle = 'rgba(0,0,0,0.018)';
        trailCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        trailCtx.globalCompositeOperation = 'lighter';

        if (previousTrailX !== null) {
          for (let i = 0; i < 3; i += 1) {
            trailCtx.beginPath();
            trailCtx.moveTo(previousTrailX, previousTrailY);
            const jitterX = (Math.random() - 0.5) * size * 0.18;
            const jitterY = (Math.random() - 0.5) * size * 0.18;
            trailCtx.lineTo(x + jitterX, y + jitterY);
            trailCtx.strokeStyle = i === 0
              ? `rgba(255,255,255,${0.032 + intensity * 0.038})`
              : `rgba(198,161,74,${0.016 + intensity * 0.024})`;
            trailCtx.lineWidth = Math.max(1, size * (i === 0 ? 0.043 : 0.024));
            trailCtx.lineCap = 'round';
            trailCtx.stroke();
          }
        }

        const particleCount = mobileQuery.matches ? 4 : 8;
        for (let i = 0; i < particleCount; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * size * 0.42;
          const px = x + Math.cos(angle) * distance;
          const py = y + Math.sin(angle) * distance;
          const radius = 0.7 + Math.random() * (mobileQuery.matches ? 2.2 : 3.6);

          trailCtx.beginPath();
          trailCtx.arc(px, py, radius, 0, Math.PI * 2);
          trailCtx.fillStyle = Math.random() > 0.58
            ? `rgba(198,161,74,${0.028 + Math.random() * 0.070})`
            : `rgba(255,255,255,${0.030 + Math.random() * 0.080})`;
          trailCtx.fill();
        }

        previousTrailX = x;
        previousTrailY = y;
      }

      function moveLogo(now) {
        const dt = clamp((now - lastTime) / 16.67, 0.2, 2.2);
        lastTime = now;

        const isMobile = mobileQuery.matches;
        if (isMobile && now > nextWaypointAt) chooseWaypoint(now);
        if (!nextWaypointAt) chooseWaypoint(now);

        const speedPulse = 0.72 + Math.sin(t * 0.19) * 0.26 + Math.sin(t * 0.047 + 4.1) * 0.20;
        t += (0.016 + Math.max(0.002, speedPulse) * 0.014) * dt;

        const logoSize = logo.getBoundingClientRect().width || 80;
        const baseX = isMobile ? waypointX : mouseX;
        const baseY = isMobile ? waypointY : mouseY;

        const wanderX =
          Math.sin(t * 0.71 + 0.4) * (isMobile ? 42 : 74) +
          Math.sin(t * 1.47 + 1.8) * (isMobile ? 22 : 38) +
          Math.cos(t * 2.13 + 0.2) * (isMobile ? 10 : 18);

        const wanderY =
          Math.cos(t * 0.59 + 2.0) * (isMobile ? 54 : 68) +
          Math.sin(t * 1.06 + 4.6) * (isMobile ? 30 : 52) -
          Math.sin(t * 0.23) * (isMobile ? 10 : 28);

        const targetX = clamp(baseX + wanderX - logoSize / 2, 8, window.innerWidth - logoSize - 8);
        const targetY = clamp(baseY + wanderY - logoSize / 2, 8, window.innerHeight - logoSize - 8);
        const ease = isMobile ? 0.018 + Math.max(0, speedPulse) * 0.010 : 0.025 + Math.max(0, speedPulse) * 0.013;

        cx = lerp(cx, targetX, ease * dt);
        cy = lerp(cy, targetY, ease * dt);

        const scale = clamp(
          1.06 + Math.sin(t * 0.53) * 0.13 + Math.sin(t * 1.31 + 1.5) * 0.075,
          0.94,
          1.25
        );

        logo.style.transform = `translate3d(${cx}px, ${cy}px, 0) scale(${scale})`;

        drawTrail(cx + logoSize * 0.5, cy + logoSize * 0.5, logoSize * scale, clamp(speedPulse, 0, 1.4));
        requestAnimationFrame(moveLogo);
      }

      requestAnimationFrame(moveLogo);
    }
  </script>
