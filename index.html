<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Diese 3 Dateien müssen im gleichen GitHub-Ordner liegen:
    - index.html
    - ott-background.jpg
    - ott-logo.png
  -->

  <style>
    :root {
      --text: rgba(232, 228, 214, 0.92);
      --soft: rgba(232, 228, 214, 0.58);
      --faint: rgba(232, 228, 214, 0.32);

      --yellow: #c0a04b;
      --yellow-soft: rgba(192, 160, 75, 0.48);
      --line: rgba(132, 116, 78, 0.34);

      --bg-top: #242b31;
      --bg-mid: #171c21;
      --bg-bottom: #0d0f12;

      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at 50% 34%, rgba(255,255,255,0.038), transparent 38%),
        linear-gradient(to bottom, var(--bg-top), var(--bg-mid) 44%, var(--bg-bottom));
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,255,255,0.03), transparent 42%),
        linear-gradient(to bottom, #252d34, #171c21 44%, #0b0d10);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 120;
      pointer-events: none;
      opacity: 0;
      background: rgba(255, 246, 210, 0.055);
      mix-blend-mode: screen;
      animation: page-flicker 11s infinite;
    }

    @keyframes page-flicker {
      0%, 6%, 6.8%, 58%, 59.5%, 100% { opacity: 0; }
      6.2% { opacity: 0.20; }
      6.45% { opacity: 0.02; }
      58.45% { opacity: 0.11; }
      58.8% { opacity: 0.035; }
    }

    a { color: inherit; text-decoration: none; }

    .noise {
      position: fixed;
      inset: -40%;
      z-index: 110;
      pointer-events: none;
      opacity: 0.08;
      mix-blend-mode: overlay;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.38) 0 0.55px, transparent 0.85px),
        radial-gradient(circle, rgba(0,0,0,0.55) 0 0.75px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      animation: grain 7s steps(7) infinite;
    }

    @keyframes grain {
      0% { transform: translate3d(0,0,0); }
      100% { transform: translate3d(-5%,4%,0); }
    }

    .logo-float {
      position: fixed;
      left: 0;
      top: 0;
      width: clamp(42px, 4.8vw, 72px);
      height: clamp(42px, 4.8vw, 72px);
      z-index: 90;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.94;
      transform: translate3d(20px, 20px, 0);
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.16))
        drop-shadow(0 0 20px rgba(192,160,75,0.12));
    }

    .logo-float img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: logo-spin 17s linear infinite, logo-flicker 4.8s steps(1) infinite;
    }

    @keyframes logo-spin {
      from { transform: rotateY(0deg) rotateZ(0deg) scale(1); }
      50% { transform: rotateY(180deg) rotateZ(12deg) scale(1.04); }
      to { transform: rotateY(360deg) rotateZ(0deg) scale(1); }
    }

    @keyframes logo-flicker {
      0%, 100% { opacity: 0.92; filter: brightness(1); }
      9% { opacity: 1; filter: brightness(1.95) sepia(0.35) saturate(1.7); }
      10% { opacity: 0.42; filter: brightness(0.55); }
      11% { opacity: 1; filter: brightness(1.55); }
      37% { opacity: 0.88; filter: brightness(1); }
      38% { opacity: 1; filter: brightness(2.2) sepia(0.5) saturate(2.2); }
      39% { opacity: 0.55; filter: brightness(0.65); }
      40% { opacity: 0.96; filter: brightness(1.1); }
      72% { opacity: 1; filter: brightness(1.75) sepia(0.25); }
      73% { opacity: 0.72; filter: brightness(0.85); }
    }

    .frame {
      min-height: 100vh;
      padding: clamp(8px, 1.8vw, 22px);
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.024), transparent 44%),
        linear-gradient(to bottom, #252d34, #171c21 44%, #0b0d10);
    }

    .poster {
      position: relative;
      min-height: calc(100vh - clamp(16px, 3.6vw, 44px));
      overflow: clip;
      isolation: isolate;
      border: 1px solid rgba(88, 80, 58, 0.42);
      background: rgba(9, 10, 12, 0.88);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.75),
        0 30px 90px rgba(0,0,0,0.52);
    }

    .background,
    .veil {
      position: fixed;
      inset: clamp(8px, 1.8vw, 22px);
      pointer-events: none;
    }

    .background {
      z-index: -5;
      overflow: hidden;
      background: #0b0d10;
      border: 1px solid rgba(88, 80, 58, 0.28);
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translateY(calc(var(--scroll, 0) * -0.032px)) scale(1.018);
      filter: brightness(0.74) contrast(1.12) saturate(0.75);
    }

    .veil {
      z-index: -4;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,255,255,0.048), rgba(255,255,255,0.006) 23%, rgba(0,0,0,0.16) 67%, rgba(0,0,0,0.42) 100%),
        linear-gradient(to bottom, rgba(31,37,42,0.04), rgba(0,0,0,0.38));
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 178vh;
      width: 100%;
    }

    .hero {
      width: min(100%, var(--max));
      min-height: calc(100vh - clamp(16px, 3.6vw, 44px));
      margin: 0 auto;
      padding: clamp(18px, 4vw, 52px);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      color: var(--soft);
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.18em;
    }

    .top a {
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(192,160,75,0.14);
      filter: blur(0.7px);
      opacity: 0.65;
      transform-origin: right center;
      transition: transform 260ms ease, opacity 260ms ease, border-color 260ms ease, filter 260ms ease, color 260ms ease;
    }

    .top a:hover {
      transform: translateY(-4px) scale(1.055);
      opacity: 1;
      filter: blur(0);
      border-color: var(--yellow-soft);
      color: var(--yellow);
    }

    .hero-center {
      align-self: center;
      justify-self: center;
      text-align: center;
      transform: translateY(4vh);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(14px, 2vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: clamp(0.20em, 0.95vw, 0.42em);
      white-space: nowrap;
      color: rgba(232, 228, 214, 0.84);
      text-shadow: 0 6px 42px rgba(0,0,0,0.94);
      opacity: clamp(0, calc(0.88 - (var(--scroll, 0) / 125)), 0.88);
      filter: blur(calc(0.25px + (var(--scroll, 0) * 0.018px)));
      transform: translateY(calc(var(--scroll, 0) * -0.45px));
    }

    .scroll-layer {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 7vh clamp(18px, 4vw, 52px) 26vh;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(20px, 3vw, 42px);
      background: transparent;
    }

    .panel {
      border-top: 1px solid rgba(192,160,75,0.16);
      padding-top: 18px;
      min-height: 170px;
      color: var(--soft);
      font-size: clamp(15px, 1.55vw, 22px);
      line-height: 1.72;
      letter-spacing: 0.13em;
      opacity: 0;
      filter: blur(3.2px);
      transform: translateY(52px) scale(0.975);
      transition: opacity 760ms ease, transform 760ms ease, filter 420ms ease, color 420ms ease, border-color 420ms ease;
    }

    .panel.visible {
      opacity: 0.68;
      transform: translateY(0) scale(1);
    }

    .panel:hover {
      opacity: 1;
      color: var(--text);
      filter: blur(0);
      transform: translateY(-12px) scale(1.055);
      border-color: var(--yellow-soft);
    }

    .panel-label {
      display: block;
      margin-bottom: 24px;
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.24em;
    }

    .panel-link {
      display: inline-block;
      transform-origin: left center;
      transition: transform 260ms ease, color 260ms ease, text-shadow 260ms ease, filter 260ms ease, opacity 260ms ease;
      opacity: 0.88;
    }

    .mail-link {
      border-bottom: 1px solid rgba(192,160,75,0.26);
      padding-bottom: 5px;
    }

    .venue-link {
      color: var(--yellow);
      border-bottom: 1px solid var(--yellow-soft);
      padding-bottom: 4px;
      text-shadow: 0 0 22px rgba(192,160,75,0.08);
    }

    .panel:hover .panel-link,
    .panel-link:hover {
      opacity: 1;
      color: var(--yellow);
      transform: translateY(-4px) scale(1.08);
      text-shadow: 0 0 24px rgba(192,160,75,0.30);
      filter: blur(0);
    }

    .mail { grid-column: 2 / span 4; }
    .live { grid-column: 8 / span 4; align-self: end; }
    .end-space { height: 18vh; }

    @media (max-width: 760px) {
      .frame { padding: 8px; }
      .poster { min-height: calc(100vh - 16px); }
      .background,
      .veil { inset: 8px; }

      .background img {
        object-fit: contain;
        object-position: center 28%;
        transform: none;
        filter: brightness(0.76) contrast(1.10) saturate(0.74);
      }

      .veil {
        background: linear-gradient(to bottom, rgba(0,0,0,0.04), rgba(0,0,0,0.38));
      }

      .page { min-height: 168vh; }

      .hero {
        padding: 18px 16px;
        min-height: calc(100vh - 16px);
      }

      .top {
        font-size: 10px;
        letter-spacing: 0.13em;
      }

      .top a { filter: none; opacity: 0.82; }

      .hero-center { transform: translateY(1vh); }

      h1 {
        font-size: clamp(13px, 3.65vw, 19px);
        letter-spacing: clamp(0.09em, 1.8vw, 0.18em);
        color: rgba(232, 228, 214, 0.82);
      }

      .scroll-layer {
        display: block;
        padding: 10vh 22px 18vh;
      }

      .panel,
      .panel.visible,
      .panel:hover {
        opacity: 0.9;
        transform: none;
        filter: none;
        min-height: auto;
        margin-top: 64px;
        font-size: 14px;
        line-height: 1.75;
        letter-spacing: 0.09em;
      }

      .panel:hover .panel-link,
      .panel-link:hover { transform: none; }

      .panel-label { margin-bottom: 14px; }

      .logo-float {
        width: 56px;
        height: 56px;
        animation: logo-mobile-drift 17s ease-in-out infinite alternate;
      }

      @keyframes logo-mobile-drift {
        0% { transform: translate3d(18px, 24px, 0); }
        33% { transform: translate3d(calc(100vw - 86px), 28vh, 0); }
        66% { transform: translate3d(26px, 58vh, 0); }
        100% { transform: translate3d(calc(100vw - 92px), 76vh, 0); }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .panel { opacity: 0.85; transform: none; filter: none; }
      h1 { opacity: 0.8; transform: none; filter: none; }
    }
  </style>
</head>

<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="logo-float" id="logo" aria-hidden="true">
    <img src="ott-logo.png" alt="" />
  </div>

  <div class="frame">
    <div class="poster">
      <div class="background" aria-hidden="true">
        <img src="ott-background.jpg" alt="" />
      </div>
      <div class="veil" aria-hidden="true"></div>

      <div class="page">
        <header class="hero">
          <div class="top">
            <a href="#live">live</a>
          </div>

          <div class="hero-center">
            <h1>das hier ist neuland</h1>
          </div>
        </header>

        <main class="scroll-layer">
          <section class="panel mail reveal" aria-label="mail">
            <a class="panel-link mail-link" href="mailto:band@ott.band">band@ott.band</a>
          </section>

          <section id="live" class="panel live reveal" aria-label="live">
            <span class="panel-label">live</span>
            <span>03.07.26</span><br />
            <a class="panel-link venue-link" href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">terrain gurzelen</a><br />
            <span>19:30</span>
          </section>
        </main>

        <div class="end-space" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const logo = document.getElementById('logo');
    const isMobile = window.matchMedia('(max-width: 760px)').matches;

    const updateScroll = () => root.style.setProperty('--scroll', String(window.scrollY || 0));
    updateScroll();
    window.addEventListener('scroll', updateScroll, { passive: true });

    const items = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, {
      threshold: 0.18,
      rootMargin: '0px 0px -10% 0px'
    });
    items.forEach((item) => observer.observe(item));

    if (!isMobile && logo) {
      let mouseX = window.innerWidth * 0.52;
      let mouseY = window.innerHeight * 0.42;
      let cx = 24;
      let cy = 24;
      let t = 0;

      window.addEventListener('mousemove', (event) => {
        mouseX = event.clientX;
        mouseY = event.clientY;
      }, { passive: true });

      function orbitLogo() {
        t += 0.024;
        const orbitX = Math.cos(t) * 58;
        const orbitY = Math.sin(t * 1.15) * 42;
        const targetX = mouseX + orbitX - 34;
        const targetY = mouseY + orbitY - 34;

        cx += (targetX - cx) * 0.045;
        cy += (targetY - cy) * 0.045;

        logo.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
        requestAnimationFrame(orbitLogo);
      }

      orbitLogo();
    }
  </script>
</body>
</html>
