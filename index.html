<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Dateien im gleichen Ordner:
    - index.html
    - ott-background.jpg
  -->

  <style>
    :root {
      --paper: #141416;
      --black: #050505;
      --text: rgba(231, 226, 211, 0.92);
      --soft: rgba(231, 226, 211, 0.55);
      --faint: rgba(231, 226, 211, 0.30);
      --line: rgba(231, 226, 211, 0.14);
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: #e7e7e7;
    }

    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background: #e7e7e7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
    }

    a { color: inherit; text-decoration: none; }

    .site {
      width: min(calc(100% - 32px), var(--max));
      margin: 8px auto 44px;
      background: var(--paper);
      box-shadow: 0 22px 80px rgba(0,0,0,0.22);
      overflow: clip;
    }

    .nav {
      height: 36px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 clamp(18px, 3vw, 42px);
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.15em;
      border-bottom: 1px solid rgba(255,255,255,0.035);
    }

    .nav a {
      display: inline-block;
      opacity: 0.72;
      filter: blur(0.35px);
      transition: transform 280ms ease, opacity 280ms ease, filter 280ms ease, color 280ms ease;
    }

    .nav a:hover {
      transform: translateY(-3px) scale(1.055);
      opacity: 1;
      filter: blur(0);
      color: var(--text);
    }

    .poster {
      position: sticky;
      top: 0;
      min-height: min(74vh, 720px);
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      background: var(--black);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -4;
      background-image: url("ott-background.jpg"), url("./ott-background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.015);
      filter: brightness(0.60) contrast(1.18) saturate(0.72) blur(0.2px);
      animation: breathe 22s ease-in-out infinite alternate;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(circle at 50% 44%, rgba(0,0,0,0.04), rgba(0,0,0,0.52) 75%),
        linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.36));
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: -60%;
      z-index: -2;
      pointer-events: none;
      opacity: 0.13;
      mix-blend-mode: overlay;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.5) 0 0.6px, transparent 0.9px),
        radial-gradient(circle, rgba(0,0,0,0.65) 0 0.7px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      animation: grain 8s steps(8) infinite;
    }

    .poster-line {
      position: absolute;
      inset: 8% 5%;
      z-index: -1;
      border: 1px solid rgba(231,226,211,0.07);
      opacity: 0.7;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(13px, 1.35vw, 22px);
      font-weight: 400;
      letter-spacing: clamp(0.34em, 1.05vw, 0.72em);
      color: rgba(231,226,211,0.83);
      text-shadow: 0 2px 26px rgba(0,0,0,0.9);
      filter: blur(0.55px);
      transition: transform 320ms ease, filter 320ms ease, opacity 320ms ease, letter-spacing 320ms ease;
      animation: focus-pulse 8s ease-in-out infinite alternate;
    }

    h1:hover {
      transform: translateY(-6px) scale(1.045);
      filter: blur(0);
      opacity: 1;
      letter-spacing: clamp(0.38em, 1.16vw, 0.78em);
    }

    .info {
      position: relative;
      z-index: 2;
      min-height: 58vh;
      padding: clamp(58px, 8vw, 112px) clamp(22px, 8vw, 180px) clamp(42px, 7vw, 92px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(36px, 9vw, 160px);
      border-top: 1px solid rgba(255,255,255,0.025);
      background:
        linear-gradient(to bottom, rgba(20,20,22,0.86), var(--paper) 28%, #121214 100%);
    }

    .card {
      align-self: start;
      color: var(--soft);
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.58;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateY(42px) scale(0.985);
      filter: blur(2.2px);
      transition:
        opacity 700ms ease,
        transform 700ms ease,
        filter 700ms ease,
        color 320ms ease;
      will-change: transform, filter, opacity;
    }

    .card.visible { opacity: 0.62; transform: translateY(0) scale(1); }

    .card:hover,
    .card:focus-within {
      opacity: 1;
      color: var(--text);
      transform: translateY(-8px) scale(1.045);
      filter: blur(0);
    }

    .label {
      display: block;
      margin-bottom: 16px;
      color: var(--faint);
      font-size: 10px;
      letter-spacing: 0.22em;
    }

    .card a {
      display: inline-block;
      border-bottom: 1px solid transparent;
      padding-bottom: 3px;
      filter: blur(0.75px);
      transition: transform 260ms ease, filter 260ms ease, border-color 260ms ease, color 260ms ease;
    }

    .card a:hover {
      transform: translateY(-4px) scale(1.045);
      filter: blur(0);
      border-color: var(--text);
      color: var(--text);
    }

    .mail { justify-self: start; }
    .live { justify-self: end; }

    .end {
      height: 26vh;
      border-top: 1px solid var(--line);
    }

    @keyframes breathe {
      from { transform: scale(1.015); filter: brightness(0.56) contrast(1.15) saturate(0.68) blur(0.35px); }
      to   { transform: scale(1.055); filter: brightness(0.66) contrast(1.22) saturate(0.78) blur(0); }
    }

    @keyframes grain {
      0% { transform: translate3d(0,0,0); }
      100% { transform: translate3d(-5%,4%,0); }
    }

    @keyframes focus-pulse {
      from { filter: blur(0.8px); opacity: 0.72; transform: translateY(0); }
      to { filter: blur(0.15px); opacity: 0.94; transform: translateY(-2px); }
    }

    @media (max-width: 760px) {
      .site { width: 100%; margin: 0; }
      .nav { height: 34px; padding: 0 18px; }
      .poster { min-height: 68vh; }
      .poster::before { background-position: center; animation: none; transform: scale(1.02); }
      .poster-line { inset: 7% 4%; }
      h1 { max-width: 80%; font-size: 13px; letter-spacing: 0.28em; text-align: center; }
      .info { min-height: 48vh; display: block; padding: 56px 22px 72px; }
      .card, .card.visible, .card:hover, .card:focus-within {
        opacity: 0.82;
        transform: none;
        filter: none;
        margin-bottom: 58px;
        font-size: 12px;
      }
      .card a { filter: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .card { opacity: 0.8; transform: none; filter: none; }
    }
  </style>
</head>

<body>
  <div class="site">
    <nav class="nav">
      <a href="#live">☰ ott</a>
    </nav>

    <header class="poster">
      <div class="grain" aria-hidden="true"></div>
      <div class="poster-line" aria-hidden="true"></div>
      <h1>das hier ist neuland</h1>
    </header>

    <main class="info">
      <section class="card mail reveal" aria-label="mail">
        <a href="mailto:band@ott.band">band@ott.band</a>
      </section>

      <section id="live" class="card live reveal" aria-label="live">
        <span class="label">live:</span>
        <a href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">
          03.07.26<br />
          terrain gurzelen<br />
          19:30
        </a>
      </section>
    </main>

    <div class="end" aria-hidden="true"></div>
  </div>

  <script>
    const revealItems = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -10% 0px' });

    revealItems.forEach((item) => observer.observe(item));

    const poster = document.querySelector('.poster');
    const title = document.querySelector('h1');

    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      const posterHeight = poster.offsetHeight || 1;
      const progress = Math.min(y / posterHeight, 1);
      title.style.transform = `translateY(${progress * -34}px) scale(${1 + progress * 0.035})`;
      title.style.filter = `blur(${Math.max(0, 0.7 - progress * 0.7)}px)`;
    }, { passive: true });
  </script>
</body>
</html>
