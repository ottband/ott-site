<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ott</title>
  <meta name="description" content="ott — das hier ist neuland" />

  <!--
    Dateien im gleichen Ordner:
    - index.html
    - ott-background.jpg
  -->

  <style>
    :root {
      --text: rgba(238, 233, 218, 0.94);
      --soft: rgba(238, 233, 218, 0.68);
      --faint: rgba(238, 233, 218, 0.40);
      --line: rgba(112, 103, 78, 0.62);
      --yellow: rgba(229, 197, 102, 0.96);
      --yellow-soft: rgba(229, 197, 102, 0.56);
      --edge: #0c0c0a;
      --black: #030303;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--edge);
    }

    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background: var(--edge);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-transform: lowercase;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .frame {
      min-height: 100vh;
      padding: clamp(8px, 1.8vw, 22px);
      background: var(--edge);
    }

    .poster {
      position: relative;
      min-height: calc(100vh - clamp(16px, 3.6vw, 44px));
      overflow: clip;
      border: 1px solid rgba(54, 49, 36, 0.95);
      background: var(--black);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.92),
        0 20px 70px rgba(0, 0, 0, 0.58);
      isolation: isolate;
    }

    .background,
    .veil,
    .grain {
      position: fixed;
      inset: clamp(8px, 1.8vw, 22px);
      pointer-events: none;
    }

    .background {
      z-index: -5;
      overflow: hidden;
      border: 1px solid rgba(54, 49, 36, 0.95);
      background: var(--black);
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translateY(calc(var(--scroll, 0) * -0.035px)) scale(1.018);
      filter: brightness(0.83) contrast(1.08) saturate(0.82);
      animation: slow-breath 22s ease-in-out infinite alternate;
    }

    @keyframes slow-breath {
      from { filter: brightness(0.80) contrast(1.06) saturate(0.80); }
      to   { filter: brightness(0.90) contrast(1.12) saturate(0.86); }
    }

    .veil {
      z-index: -4;
      background:
        radial-gradient(circle at 49% 38%, rgba(0,0,0,0.00), rgba(0,0,0,0.22) 72%, rgba(0,0,0,0.42) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.03), rgba(0,0,0,0.28));
    }

    .grain {
      inset: -35%;
      z-index: -3;
      opacity: 0.105;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.42) 0 0.55px, transparent 0.85px),
        radial-gradient(circle, rgba(0,0,0,0.52) 0 0.75px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      mix-blend-mode: overlay;
      animation: grain 7s steps(7) infinite;
    }

    @keyframes grain {
      0% { transform: translate3d(0,0,0); }
      100% { transform: translate3d(-5%,4%,0); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 178vh;
      width: 100%;
    }

    .hero {
      width: min(100%, var(--max));
      min-height: calc(100vh - clamp(16px, 3.6vw, 44px));
      margin: 0 auto;
      padding: clamp(18px, 4vw, 52px);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      color: var(--soft);
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.18em;
    }

    .mark {
      color: var(--text);
      letter-spacing: 0.42em;
      text-shadow: 0 4px 24px rgba(0,0,0,0.75);
    }

    .top a {
      display: inline-block;
      border-bottom: 1px solid var(--line);
      padding-bottom: 4px;
      filter: blur(0.75px);
      opacity: 0.72;
      transform: translateY(0) scale(1);
      transform-origin: right center;
      transition: transform 260ms ease, opacity 260ms ease, border-color 260ms ease, filter 260ms ease, color 260ms ease;
    }

    .top a:hover {
      transform: translateY(-5px) scale(1.055);
      opacity: 1;
      filter: blur(0);
      border-color: var(--yellow-soft);
      color: var(--yellow);
    }

    .hero-center {
      align-self: center;
      justify-self: center;
      text-align: center;
      transform: translateY(4vh);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 2.9vw, 42px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: clamp(0.20em, 1vw, 0.42em);
      white-space: nowrap;
      text-shadow: 0 6px 42px rgba(0,0,0,0.94);
      opacity: 0.88;
      filter: blur(0.35px);
    }

    .scroll-layer {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 7vh clamp(18px, 4vw, 52px) 26vh;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(20px, 3vw, 42px);
      background: transparent;
    }

    .panel {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      min-height: 170px;
      color: var(--soft);
      font-size: clamp(15px, 1.55vw, 22px);
      line-height: 1.72;
      letter-spacing: 0.13em;
      opacity: 0;
      filter: blur(3.2px);
      transform: translateY(52px) scale(0.975);
      transition: opacity 760ms ease, transform 760ms ease, filter 420ms ease, color 420ms ease, border-color 420ms ease;
    }

    .panel.visible {
      opacity: 0.74;
      transform: translateY(0) scale(1);
    }

    .panel:hover {
      opacity: 1;
      color: var(--text);
      filter: blur(0);
      transform: translateY(-12px) scale(1.055);
      border-color: var(--yellow-soft);
    }

    .panel-label {
      display: block;
      margin-bottom: 24px;
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.24em;
    }

    .panel-link {
      display: inline-block;
      transform-origin: left center;
      transition: transform 260ms ease, color 260ms ease, text-shadow 260ms ease, filter 260ms ease;
    }

    .mail-link {
      border-bottom: 1px solid rgba(229, 197, 102, 0.28);
      padding-bottom: 5px;
    }

    .venue-link {
      color: var(--yellow);
      border-bottom: 1px solid var(--yellow-soft);
      padding-bottom: 4px;
      text-shadow: 0 0 22px rgba(229, 197, 102, 0.10);
    }

    .panel:hover .panel-link,
    .panel-link:hover {
      color: var(--yellow);
      transform: translateY(-4px) scale(1.08);
      text-shadow: 0 0 24px rgba(229, 197, 102, 0.30);
      filter: blur(0);
    }

    .mail { grid-column: 2 / span 4; }
    .live { grid-column: 8 / span 4; align-self: end; }

    .end-space { height: 18vh; }

    @media (max-width: 760px) {
      :root {
        --line: rgba(106, 96, 70, 0.62);
      }

      .frame { padding: 8px; }

      .poster {
        min-height: calc(100vh - 16px);
        border-color: rgba(48, 43, 32, 0.95);
      }

      .background,
      .veil {
        inset: 8px;
        border-color: rgba(48, 43, 32, 0.95);
      }

      .background img {
        object-fit: contain;
        object-position: center 28%;
        transform: none;
        animation: none;
        filter: brightness(0.86) contrast(1.08) saturate(0.82);
      }

      .veil {
        background:
          linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0.36));
      }

      .grain { opacity: 0.075; }

      .page { min-height: 168vh; }

      .hero {
        padding: 18px 16px;
        min-height: calc(100vh - 16px);
      }

      .top {
        font-size: 10px;
        letter-spacing: 0.13em;
      }

      .mark { letter-spacing: 0.28em; }

      .top a {
        filter: none;
        opacity: 0.88;
      }

      .hero-center {
        justify-self: center;
        text-align: center;
        transform: translateY(1vh);
      }

      h1 {
        font-size: clamp(13px, 3.65vw, 19px);
        letter-spacing: clamp(0.09em, 1.8vw, 0.18em);
        white-space: nowrap;
        filter: none;
        opacity: 0.94;
      }

      .scroll-layer {
        display: block;
        padding: 10vh 22px 18vh;
      }

      .panel,
      .panel.visible,
      .panel:hover {
        opacity: 0.94;
        transform: none;
        filter: none;
        min-height: auto;
        margin-top: 64px;
        font-size: 14px;
        line-height: 1.75;
        letter-spacing: 0.09em;
      }

      .panel:hover .panel-link,
      .panel-link:hover {
        transform: none;
      }

      .panel-label { margin-bottom: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .panel {
        opacity: 0.9;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="poster">
      <div class="background" aria-hidden="true">
        <img src="ott-background.jpg" alt="" />
      </div>
      <div class="veil" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <div class="page">
        <header class="hero">
          <div class="top">
            <span class="mark">ott</span>
            <a href="#live">live</a>
          </div>

          <div class="hero-center">
            <h1>das hier ist neuland</h1>
          </div>
        </header>

        <main class="scroll-layer">
          <section class="panel mail reveal" aria-label="mail">
            <a class="panel-link mail-link" href="mailto:band@ott.band">band@ott.band</a>
          </section>

          <section id="live" class="panel live reveal" aria-label="live">
            <span class="panel-label">live</span>
            <span>03.07.26</span><br />
            <a class="panel-link venue-link" href="https://terrain-gurzelen.org/summerfest-2026/" target="_blank" rel="noreferrer">terrain gurzelen</a><br />
            <span>19:30</span>
          </section>
        </main>

        <div class="end-space" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const updateScroll = () => root.style.setProperty('--scroll', String(window.scrollY || 0));
    updateScroll();
    window.addEventListener('scroll', updateScroll, { passive: true });

    const items = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, {
      threshold: 0.18,
      rootMargin: '0px 0px -10% 0px'
    });

    items.forEach((item) => observer.observe(item));
  </script>
</body>
</html>
